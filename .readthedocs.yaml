# Read the Docs configuration — timestudy-backend
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

# Install only the Sphinx dependencies needed to build the docs
python:
  install:
    - requirements: docs/requirements.txt

# Sphinx is the documentation tool — conf.py lives in docs/
sphinx:
  configuration: docs/conf.py
  fail_on_warning: false
